<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLBB Draft Counter Picker</title>
  <link rel="stylesheet" href="style.css?v=3">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
</head>
<body>
  <div class="container">
    <h1>⚔️ MLBB Draft Counter Picker</h1>
    <p class="subtitle">Enter 5 enemy heroes — get counter-picks, items, playstyle & more</p>

    <div class="input-group">
      <div class="input-row" data-role="roam">
        <div class="input-num n1">1</div>
        <input type="text" id="h1" class="input-field" placeholder="Enemy Roam (e.g. atlas)" autocomplete="off" autofocus>
        <div class="autocomplete-list"></div>
      </div>
      <div class="input-row" data-role="exp">
        <div class="input-num n2">2</div>
        <input type="text" id="h2" class="input-field" placeholder="Enemy EXP Lane (e.g. chou)" autocomplete="off">
        <div class="autocomplete-list"></div>
      </div>
      <div class="input-row" data-role="jungle">
        <div class="input-num n3">3</div>
        <input type="text" id="h3" class="input-field" placeholder="Enemy Jungler (e.g. fanny)" autocomplete="off">
        <div class="autocomplete-list"></div>
      </div>
      <div class="input-row" data-role="mid">
        <div class="input-num n4">4</div>
        <input type="text" id="h4" class="input-field" placeholder="Enemy Mid Lane (e.g. valir)" autocomplete="off">
        <div class="autocomplete-list"></div>
      </div>
      <div class="input-row" data-role="gold">
        <div class="input-num n5">5</div>
        <input type="text" id="h5" class="input-field" placeholder="Enemy Gold Lane (e.g. beatrix)" autocomplete="off">
        <div class="autocomplete-list"></div>
      </div>
    </div>

    <div class="btn-wrap">
      <button class="analyze-btn" onclick="analyze()">⚔️ ANALYZE DRAFT</button>
    </div>

    <div class="results" id="results"></div>
  </div>

  <script src="app.js?v=3"></script>
  <script>
    function analyze() {
      const names = [1,2,3,4,5].map(i => document.getElementById('h'+i).value.trim());
      if (names.some(n => !n)) {
        document.getElementById('results').innerHTML = '<div class="section"><p class="danger">Please fill all 5 hero fields.</p></div>';
        return;
      }
      const r = runAnalysis(names);
      if (r.error) {
        document.getElementById('results').innerHTML = `<div class="section"><p class="danger">${r.error}</p><p class="item-hint">Try: fanny, chou, ruby, ling, haya, atlas, estes, etc.</p></div>`;
        return;
      }
      render(r);
    }

    function render(r) {
      let h = '';

      // ── Enemy Team ──
      h += `<div class="section">`;
      h += `<div class="section-title">Enemy Team</div>`;
      h += `<div style="color:#aab;font-size:.88rem;margin-bottom:6px">${r.enemy.join(' · ')}</div>`;
      if (r.badges.length) h += `<div class="badges">${r.badges.map(b => {
        const cls = {HEAL:'green',TANKY:'green',DIVE:'red',SQUISHY:'red',CC:'purple','2+ TANKS':'blue',POKE:'yellow'}[b]||'';
        return `<span class="badge ${cls}">${b}</span>`;
      }).join('')}</div>`;
      const dmgNotes = [];
      if (r.nPhys>=3) dmgNotes.push('3+ Physical damage — build Blade Armor');
      if (r.nMagic>=3) dmgNotes.push('3+ Magic damage — build Athena\'s Shield');
      if (r.hasTrueDmg) dmgNotes.push('True damage present — build HP items, armor won\'t help');
      dmgNotes.forEach(d => h += `<div class="dmg-info">${d}</div>`);
      h += '</div>';

      // ── Recommended Picks ──
      const roles = [['roam','Roam'],['exp','EXP Lane'],['jungle','Jungle'],['mid','Mid Lane'],['gold','Gold Lane']];
      h += '<div class="section"><div class="section-title">Counter Picks</div>';
      roles.forEach(([key,label]) => {
        const picks = r.rolePicks[key] || [];
        if (!picks.length) return;
        h += `<div class="role-section"><div class="role-name" data-role="${key}">${label}</div>`;
        picks.forEach((p,i) => {
          h += `<div class="pick">
            <div class="pick-header"><span class="pick-rank">${i+1}</span><span class="pick-hero">${p.hero}</span></div>
            <div class="pick-reason">${p.reason}</div>
          </div>`;
        });
        const items = r.items[key] || [];
        if (items.length) {
          h += `<div class="items-row"><b>Build:</b> ${items.join(' → ')}</div>`;
          if (key==='roam' && r.itemsGuide.some(g=>g.includes('anti-heal'))) h += `<div class="must-buy">MUST BUY: Dominance Ice — cuts enemy healing by 50%</div>`;
          if (key==='gold' && r.nPhys>=3) h += `<div class="must-buy">MUST BUY: Wind of Nature — 2s physical immunity vs their assassins</div>`;
          if (key==='mid' && r.nTanks>=2) h += `<div class="must-buy">MUST BUY: Divine Glaive — 40% magic penetration for tanky teams</div>`;
          if (key==='jungle' && r.nTanks>=2) h += `<div class="must-buy">MUST BUY: Demon Hunter Sword — % HP damage shreds tanks</div>`;
        }
        h += '</div>';
      });
      h += '</div>';

      // ── Synergies ──
      if (r.synergies.length) {
        h += '<div class="section"><div class="section-title">Team Synergies</div>';
        r.synergies.forEach(s => h += `<div class="synergy">▸ ${s}</div>`);
        h += '</div>';
      }

      // ── Playstyle Guide ──
      const ps = r.playstyle;
      h += '<div class="section"><div class="section-title">Playstyle Guide</div>';

      if (ps.early.length) {
        h += `<div class="phase"><div class="phase-label early">Early Game (0–8 min)</div>`;
        ps.early.forEach(t => h += `<div class="tip-row">${t}</div>`);
        h += '</div>';
      }
      if (ps.mid.length) {
        h += `<div class="phase"><div class="phase-label mid-game">Mid Game (8–15 min)</div>`;
        ps.mid.forEach(t => h += `<div class="tip-row">${t}</div>`);
        h += '</div>';
      }
      if (ps.late.length) {
        h += `<div class="phase"><div class="phase-label late">Late Game (15+ min)</div>`;
        ps.late.forEach(t => h += `<div class="tip-row">${t}</div>`);
        h += '</div>';
      }

      if (ps.wincon.length) {
        h += `<div style="margin-top:10px;margin-bottom:6px;color:#00e5ff;font-weight:700;font-size:.82rem;text-transform:uppercase;letter-spacing:.5px">Win Conditions</div>`;
        ps.wincon.forEach(t => h += `<div class="wincon">▸ ${t}</div>`);
      }
      if (ps.danger.length) {
        h += `<div style="margin-top:10px;margin-bottom:6px;color:#f66;font-weight:700;font-size:.82rem;text-transform:uppercase;letter-spacing:.5px">Danger Warnings</div>`;
        ps.danger.forEach(t => h += `<div class="danger">⚠ ${t}</div>`);
      }
      h += '</div>';

      // ── Specific Counter Tips ──
      if (r.counterTips.length) {
        h += '<div class="section"><div class="section-title">How to Counter Each Hero</div>';
        r.counterTips.forEach(t => {
          h += `<div class="counter-block">
            <div class="counter-hero">vs ${t.hero}</div>
            <div class="counter-picks"><b>Best picks:</b> ${t.counters.slice(0,5).join(', ')}</div>
            <div class="counter-strategy">${t.strategy}</div>
          </div>`;
        });
        h += '</div>';
      }

      // ── Itemization ──
      if (r.itemsGuide.length) {
        h += '<div class="section"><div class="section-title">Itemization Priority</div>';
        r.itemsGuide.forEach(g => h += `<div class="item-hint">${g}</div>`);
        h += '</div>';
      }

      document.getElementById('results').innerHTML = h;
      document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
    }

    // Enter key analyzes + setup autocomplete
    document.querySelectorAll('input').forEach(el => {
      el.addEventListener('keydown', e => { if (e.key==='Enter' && !activeAc) analyze(); });
      setupAutocomplete(el, el.id);
    });
  </script>
</body>
</html>
